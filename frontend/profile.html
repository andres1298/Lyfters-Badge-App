<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil — Lyfter</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando perfil...</span>
  </div>
  <div id="app" style="position:relative;z-index:1;max-width:600px;margin:0 auto;padding:0 0 80px;"></div>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/particles.js"></script>
  <script>
  (function() {
    var API = window.LyfterAPI;
    var U = window.LyfterUtils;
    var user = API.currentUser();
    if (!user) { window.location.replace('login.html'); return; }

    var app = document.getElementById('app');
    var activeTab = 'stats'; // stats | activity | reviews | achievements

    async function init() {
      var profile = await API.getProfile();
      U.hideLoading();
      renderHeader(profile);
      renderTabs();
      renderTab(activeTab, profile);
    }

    // ── HEADER con foto y nombre ──
    function renderHeader(profile) {
      var initials = (user.name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
      var avatarHtml = user.avatar
        ? '<img src="' + U.esc(user.avatar) + '" style="width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid #d897e7;" />'
        : '<div style="width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#d897e7,#e68a8d);display:flex;align-items:center;justify-content:center;font-family:Poppins,sans-serif;font-size:28px;font-weight:700;color:#1c1f27;">' + initials + '</div>';

      var headerEl = document.createElement('div');
      headerEl.style.cssText = 'padding:32px 20px 20px;text-align:center;';
      headerEl.innerHTML =
        avatarHtml +
        '<h2 style="font-family:Poppins,sans-serif;font-size:22px;font-weight:700;color:#f4f6f9;margin:12px 0 4px;">' + U.esc(user.name||'') + '</h2>' +
        '<p style="font-family:Manrope,sans-serif;font-size:13px;color:#8b93a3;margin:0 0 8px;">' + U.esc(user.email||'') + '</p>' +
        '<div style="display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:999px;background:rgba(216,151,231,0.12);border:1px solid rgba(216,151,231,0.25);">' +
          '<span style="font-size:14px;color:#ffc850;">⭐</span>' +
          '<span style="font-family:Poppins,sans-serif;font-size:13px;font-weight:700;color:#d897e7;">' + (profile.xp_total||0) + ' XP</span>' +
          '<span style="font-size:11px;color:#8b93a3;">· Nv. ' + (profile.level||1) + '</span>' +
        '</div>';
      app.appendChild(headerEl);
    }

    // ── 4 BOTONES DE TABS ──
    function renderTabs() {
      var tabs = [
        { id: 'stats', label: 'Stats', icon: '📊' },
        { id: 'activity', label: 'Mi actividad', icon: '🗓' },
        { id: 'reviews', label: 'Reseñas', icon: '⭐' },
        { id: 'achievements', label: 'Logros', icon: '🏆' },
      ];

      var tabsEl = document.createElement('div');
      tabsEl.id = 'tabs-bar';
      tabsEl.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px;margin-bottom:20px;';
      tabsEl.innerHTML = tabs.map(function(t) {
        var active = t.id === activeTab;
        return '<button id="tab-btn-' + t.id + '" onclick="switchTab(\'' + t.id + '\')" style="' +
          'padding:12px 6px;border-radius:14px;border:1px solid ' + (active ? '#d897e7' : '#2f343f') + ';' +
          'background:' + (active ? 'rgba(216,151,231,0.15)' : '#1c1f27') + ';' +
          'color:' + (active ? '#d897e7' : '#8b93a3') + ';' +
          'font-family:Poppins,sans-serif;font-size:11px;font-weight:700;cursor:pointer;' +
          'display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s;">' +
          '<span style="font-size:20px;">' + t.icon + '</span>' +
          t.label +
        '</button>';
      }).join('');
      app.appendChild(tabsEl);

      var contentEl = document.createElement('div');
      contentEl.id = 'tab-content';
      contentEl.style.cssText = 'padding:0 16px;';
      app.appendChild(contentEl);
    }

    window.switchTab = function(tabId) {
      activeTab = tabId;
      var tabs = ['stats','activity','reviews','achievements'];
      tabs.forEach(function(t) {
        var btn = document.getElementById('tab-btn-' + t);
        if (!btn) return;
        var active = t === tabId;
        btn.style.borderColor = active ? '#d897e7' : '#2f343f';
        btn.style.background = active ? 'rgba(216,151,231,0.15)' : '#1c1f27';
        btn.style.color = active ? '#d897e7' : '#8b93a3';
      });
      API.getProfile().then(function(profile) { renderTab(tabId, profile); });
    };

    // ── CONTENIDO DE CADA TAB ──
    async function renderTab(tabId, profile) {
      var content = document.getElementById('tab-content');
      content.innerHTML = '<p style="text-align:center;color:#8b93a3;padding:32px;font-size:13px;">Cargando...</p>';

      if (tabId === 'stats') await renderStats(profile, content);
      else if (tabId === 'activity') await renderActivity(content);
      else if (tabId === 'reviews') await renderReviews(content);
      else if (tabId === 'achievements') await renderAchievements(profile, content);
    }

    // ── TAB: STATS ──
    async function renderStats(profile, content) {
      var events = profile.events || [];

      // Tags favoritos
      var tagCount = {};
      events.forEach(function(ev) {
        (ev.tags||[]).forEach(function(tag) { tagCount[tag] = (tagCount[tag]||0) + 1; });
      });
      var tagEntries = Object.entries(tagCount).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
      var totalTags = tagEntries.reduce(function(s,e){return s+e[1];},0);

      // Top 3 eventos (por progreso del usuario)
      var topEvents = events.slice().sort(function(a,b){return (b.obtained||0)-(a.obtained||0);}).slice(0,3);

      // Eventos por workspace
      var wsCount = {};
      events.forEach(function(ev) {
        var ws = ev.workspace_name || 'Sin empresa';
        wsCount[ws] = (wsCount[ws]||0) + 1;
      });

      content.innerHTML =
        // Donut de tags
        '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:16px;padding:20px;margin-bottom:14px;">' +
          '<h3 style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin:0 0 16px;">Tags favoritos</h3>' +
          (tagEntries.length
            ? '<div style="position:relative;width:160px;margin:0 auto 16px;"><canvas id="chart-tags" height="160"></canvas></div>' +
              '<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">' +
                tagEntries.map(function(e, i) {
                  var colors = ['#d897e7','#70cfff','#ffc850','#4ade80','#e68a8d','#f97316'];
                  var pct = totalTags ? Math.round(e[1]/totalTags*100) : 0;
                  return '<div style="display:flex;align-items:center;gap:4px;">' +
                    '<span style="width:10px;height:10px;border-radius:50%;background:' + colors[i] + ';display:inline-block;"></span>' +
                    '<span style="font-size:11px;color:#8b93a3;">' + U.esc(e[0]) + ' ' + pct + '%</span>' +
                  '</div>';
                }).join('') +
              '</div>'
            : '<p style="text-align:center;color:#8b93a3;font-size:13px;">Sin datos aún</p>') +
        '</div>' +

        // Top 3 eventos
        '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:16px;padding:20px;margin-bottom:14px;">' +
          '<h3 style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin:0 0 12px;">Top eventos</h3>' +
          (topEvents.length
            ? topEvents.map(function(ev, i) {
                var medals = ['🥇','🥈','🥉'];
                var pct = ev.total ? Math.round((ev.obtained||0)/ev.total*100) : 0;
                return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #2f343f;">' +
                  '<span style="font-size:20px;">' + (medals[i]||'') + '</span>' +
                  '<div style="flex:1;min-width:0;">' +
                    '<div style="font-family:Poppins,sans-serif;font-size:13px;font-weight:600;color:#f4f6f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + U.esc(ev.name||ev.nombre||'') + '</div>' +
                    '<div style="font-size:11px;color:#8b93a3;">' + (ev.obtained||0) + '/' + (ev.total||0) + ' badges</div>' +
                  '</div>' +
                  '<span style="font-family:Poppins,sans-serif;font-size:13px;font-weight:700;color:#d897e7;">' + pct + '%</span>' +
                '</div>';
              }).join('')
            : '<p style="text-align:center;color:#8b93a3;font-size:13px;">Sin eventos aún</p>') +
        '</div>' +

        // Barras por empresa
        '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:16px;padding:20px;margin-bottom:14px;">' +
          '<h3 style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin:0 0 16px;">Eventos por empresa</h3>' +
          (Object.keys(wsCount).length
            ? '<canvas id="chart-ws" height="200"></canvas>'
            : '<p style="text-align:center;color:#8b93a3;font-size:13px;">Sin datos aún</p>') +
        '</div>';

      // Renderizar gráficas
      setTimeout(function() {
        if (tagEntries.length) {
          var colors = ['#d897e7','#70cfff','#ffc850','#4ade80','#e68a8d','#f97316'];
          new Chart(document.getElementById('chart-tags'), {
            type: 'doughnut',
            data: { labels: tagEntries.map(function(e){return e[0];}), datasets: [{ data: tagEntries.map(function(e){return e[1];}), backgroundColor: colors.slice(0,tagEntries.length), borderWidth: 0 }] },
            options: { responsive: false, plugins: { legend: { display: false } }, cutout: '65%' }
          });
        }
        if (Object.keys(wsCount).length) {
          var wsLabels = Object.keys(wsCount);
          new Chart(document.getElementById('chart-ws'), {
            type: 'bar',
            data: { labels: wsLabels, datasets: [{ data: wsLabels.map(function(k){return wsCount[k];}), backgroundColor: '#d897e766', borderColor: '#d897e7', borderWidth: 2, borderRadius: 6 }] },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#8b93a3' }, grid: { color: '#2f343f' } }, y: { ticks: { color: '#8b93a3', stepSize: 1 }, grid: { color: '#2f343f' } } } }
          });
        }
      }, 100);
    }

    // ── TAB: MI ACTIVIDAD ──
    async function renderActivity(content) {
      try {
        var profile = await API.getProfile();
        var allEvents = profile.events || [];
        var savedRaw = JSON.parse(localStorage.getItem('saved_events') || '[]');

        // Guardados: eventos guardados por el usuario
        var saved = savedRaw.map(function(id) { return allEvents.find(function(e){return e.id===id;}); }).filter(Boolean);

        // Participando: eventos en curso donde tiene scans
        var participating = allEvents.filter(function(ev){ return ev.status === 'ongoing' && (ev.obtained||0) > 0; });

        // Completados: eventos donde tiene todos los badges o finalizados
        var completed = allEvents.filter(function(ev){ return ev.status === 'finished' || (ev.obtained > 0 && ev.obtained >= ev.total); });

        var sections = [
          { title: 'Guardados', emoji: '🔖', events: saved, empty: 'No tenés eventos guardados. Explorá eventos y guárdalos.' },
          { title: 'Participando', emoji: '🎯', events: participating, empty: 'No estás participando en ningún evento activo.' },
          { title: 'Completados', emoji: '✅', events: completed, empty: 'Aún no has completado ningún evento.' },
        ];

        content.innerHTML = sections.map(function(sec) {
          return '<div style="margin-bottom:20px;">' +
            '<h3 style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin:0 0 10px;">' + sec.emoji + ' ' + sec.title + '</h3>' +
            (sec.events.length
              ? sec.events.map(function(ev) {
                  return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:12px;padding:14px;margin-bottom:8px;">' +
                    '<div style="font-family:Poppins,sans-serif;font-size:13px;font-weight:600;color:#f4f6f9;">' + U.esc(ev.name||ev.nombre||'') + '</div>' +
                    '<div style="font-size:11px;color:#8b93a3;margin-top:3px;">' + (ev.workspace_name||'') + '</div>' +
                  '</div>';
                }).join('')
              : '<p style="font-size:13px;color:#8b93a3;padding:12px 0;">' + sec.empty + '</p>') +
          '</div>';
        }).join('');
      } catch(e) {
        content.innerHTML = '<p style="color:#e68a8d;text-align:center;padding:32px;">Error al cargar actividad.</p>';
      }
    }

    // ── TAB: RESEÑAS ──
    async function renderReviews(content) {
      try {
        var res = await fetch(API.base + '/auth/my-reviews', { headers: API.authHeaders() }).then(r => r.json());
        var reviews = res.reviews || [];
        var labels = { recommend: {si:'Sí',no:'No',talvez:'Tal vez'}, best_part: {organizacion:'Organización',contenido:'Contenido',networking:'Networking',badges:'Badges',otro:'Otro'}, return_again: {si:'Sí',no:'No',depende:'Depende'} };

        content.innerHTML = reviews.length
          ? reviews.map(function(r) {
              var stars = '★'.repeat(r.rating) + '<span style="color:#2e323d;">' + '★'.repeat(5-r.rating) + '</span>';
              return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:16px;margin-bottom:12px;">' +
                '<div style="font-family:Poppins,sans-serif;font-size:13px;font-weight:700;color:#f4f6f9;margin-bottom:6px;">' + U.esc(r.event_name||'Evento') + '</div>' +
                '<div style="font-size:18px;color:#ffc850;margin-bottom:8px;">' + stars + '</div>' +
                '<div style="display:flex;flex-wrap:wrap;gap:6px;">' +
                  (r.recommend ? pill('¿Recomendaría?', labels.recommend[r.recommend]||r.recommend, '#70cfff') : '') +
                  (r.best_part ? pill('Lo mejor', labels.best_part[r.best_part]||r.best_part, '#d897e7') : '') +
                  (r.return_again ? pill('¿Volvería?', labels.return_again[r.return_again]||r.return_again, '#4ade80') : '') +
                '</div>' +
              '</div>';
            }).join('')
          : '<p style="text-align:center;color:#8b93a3;padding:32px;font-size:13px;">Aún no has dejado reseñas.</p>';
      } catch(e) {
        content.innerHTML = '<p style="color:#e68a8d;text-align:center;padding:32px;">Error al cargar reseñas.</p>';
      }
    }

    // ── TAB: LOGROS ──
    async function renderAchievements(profile, content) {
      var achievements = profile.achievements || [];
      var defs = await API.loadAchievementDefs();

      content.innerHTML = defs.length
        ? '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">' +
            defs.map(function(def) {
              var unlocked = achievements.find(function(a){ return a.slug === def.slug; });
              var ICONS = window.LyfterUtils.ACHIEVEMENT_ICONS || {};
              var iconSrc = ICONS[def.slug] || 'assets/icons/ui/icono-badges-creados.png';
              return '<div style="background:#1c1f27;border:1px solid ' + (unlocked ? '#d897e7' : '#2f343f') + ';border-radius:14px;padding:14px;text-align:center;opacity:' + (unlocked ? '1' : '0.4') + ';">' +
                '<img src="' + iconSrc + '" style="width:40px;height:40px;object-fit:contain;margin-bottom:8px;" />' +
                '<div style="font-family:Poppins,sans-serif;font-size:11px;font-weight:700;color:' + (unlocked ? '#f4f6f9' : '#8b93a3') + ';">' + U.esc(def.name||def.slug) + '</div>' +
                (unlocked ? '<div style="font-size:10px;color:#4ade80;margin-top:3px;">✓ Desbloqueado</div>' : '') +
              '</div>';
            }).join('') +
          '</div>'
        : '<p style="text-align:center;color:#8b93a3;padding:32px;font-size:13px;">Sin logros definidos.</p>';
    }

    function pill(label, value, color) {
      return '<div style="background:rgba(255,255,255,0.04);border:1px solid #2f343f;border-radius:8px;padding:5px 8px;">' +
        '<div style="font-size:10px;color:#8b93a3;font-weight:700;text-transform:uppercase;">' + label + '</div>' +
        '<div style="font-size:12px;color:' + color + ';font-weight:700;">' + value + '</div>' +
      '</div>';
    }

    setTimeout(function() { U.hideLoading(); }, 6000);
    init();
  })();
  </script>
</body>
</html>
